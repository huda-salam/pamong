# config/default.yaml — nilai default aman, di-commit ke repo.
# Lapis paling rendah; ditimpa oleh config/{env}.yaml, config/local.yaml, lalu env GOV_*.
# JANGAN taruh kredensial nyata di sini — gunakan config/local.yaml (tidak di-commit)
# atau environment variable.

env: development

# db: DEFAULT/SHARED koneksi tenant DB (ADR-004). Host & nama DB per-tenant berasal
# dari id.tenant_registry saat runtime; di sini hanya kredensial+pool bersama + host
# default Tier 1. `name` cuma fallback single-tenant/dev.
db:
  host: localhost
  port: 5432
  name: pamong
  user: pamong
  password: ""
  pool_max: 25
  pool_idle: 5

# identity_db: koneksi PENUH ke identity DB sentral (registry tenant hidup di sini).
identity_db:
  host: localhost
  port: 5432
  name: gov_identity
  user: pamong
  password: ""
  pool_max: 10
  pool_idle: 2

# central_db: DB sentral data master/referensi shared (entity ResidencyCentral, ADR-005).
# Biarkan host kosong = jatuh ke identity DB (default; tanpa infra baru). Isi hanya bila
# data referensi dipisah ke instance gov_central tersendiri.
central_db:
  host: ""
  port: 5432
  name: gov_central
  user: ""
  password: ""
  pool_max: 10
  pool_idle: 2

# provision_db: kredensial ADMIN (ber-CREATEDB) untuk provisioning tenant DB (ADR-006).
# TERPISAH dari `db` (runtime, least-privilege). Kosong = provisioning tidak tersedia
# sampai diisi via env/local. `maintenance` = DB tempat connect saat CREATE DATABASE.
provision_db:
  user: ""
  password: ""
  maintenance: postgres

eventbus:
  driver: memory
  url: ""
  stream: pamong

storage:
  driver: local
  endpoint: ""
  bucket: pamong
  access_key: ""
  secret_key: ""

cache:
  driver: memory
  url: ""
  ttl_default: 300

observability:
  otel_endpoint: ""
  metrics_enabled: false
  tracing_enabled: false
  log_level: info
  log_format: text

auth:
  # Token INTERNAL (diterbitkan & diverifikasi Pamong sendiri, HS256; ADR-007).
  # token_secret: kunci HMAC. JANGAN commit nilai nyata — set di config/local.yaml atau env
  # GOV_AUTH_TOKEN_SECRET. Wajib & ≥32 karakter di production (divalidasi saat boot).
  token_secret: ""
  token_ttl: 3600        # umur token internal (detik); 0 = default 1 jam
  # Token SSO EKSTERNAL (verifikasi token dari IdP lain) — dipakai PR auth eksternal.
  jwks_url: ""
  issuer: ""
  audience: pamong

ratelimit:
  enabled: false
  rps: 100
  burst: 20
